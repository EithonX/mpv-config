# Smart Cache — Adaptive demuxer cache for network streams
# Place in: script-opts/smart_cache.conf

# enable/disable the smart cache system
enabled=yes

# only apply to network streams (skip local files)
network_only=yes

# target seconds of forward buffer per bitrate tier
# ≤ 2 Mbps (low quality streams)
target_secs_low=120
# 2-10 Mbps (standard movies, ~4GB/3hr)
target_secs_mid=90
# 10-30 Mbps (HD anime, ~3-7GB/23min)
target_secs_high=60
# 30-80 Mbps (4K content)
target_secs_vhigh=45
# ≥ 80 Mbps (extreme bitrate)
target_secs_extreme=30

# hard limits for forward buffer (MiB)
min_forward_mib=32
max_forward_mib=512

# hard limits for back buffer (MiB)
min_back_mib=16
max_back_mib=256

# back buffer as a fraction of forward buffer
back_ratio=0.5

# cache-secs limits
min_cache_secs=30
max_cache_secs=300

# re-adjust cache after N seconds using observed bitrate (0 = disabled)
# only adjusts upward to avoid disrupting playback
readjust_after_secs=30

# auto-enable disk cache when ideal forward buffer exceeds this (MiB)
# prevents RAM exhaustion on large/high-bitrate files
# set to 0 to never use disk cache
disk_cache_threshold_mib=384

# disk cache directory (mpv expand-path syntax)
disk_cache_dir=~~cache/smart_cache

# log cache decisions to mpv console
verbose=yes
