# Thumbfast tuning for ModernZ and chapter/seek browsing

# Pre-spawn the thumbnailer so the first hover feels immediate.
spawn_first=yes

# Keep thumbnails crisp without getting excessive on portable setups.
max_width=220
max_height=220
scale_factor=1

# Keep defaults conservative for compatibility and lower overhead.
network=no
audio=no
hwdec=no
tone_mapping=no
quit_after_inactivity=0
