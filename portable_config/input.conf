# --- Mouse Controls ---
MBTN_LEFT     cycle pause
MBTN_LEFT_DBL ignore
WHEEL_UP      add volume 2
WHEEL_DOWN    add volume -2

# --- Arrow Keys (Volume) ---
UP            add volume 2
DOWN          add volume -2

# --- Seeking with Visual Text (The Fix) ---
# We manually add 'show-text' to the standard arrow keys now

# Right Arrow: Forward 5 seconds
RIGHT         no-osd seek  5; show-text ">> 5s" 1500

# Left Arrow: Backward 5 seconds
LEFT          no-osd seek -5; show-text "<< 5s" 1500

# Shift+Right: Forward 85 seconds (Large Skip)
Shift+RIGHT   no-osd seek  85; show-text ">> 1m 25s" 1500

# Shift+Left: Backward 25 seconds (Large Skip)
Shift+LEFT    no-osd seek -85; show-text "<< 1m 25s" 1500

# Shift+End: Forward 25 seconds
Shift+END     no-osd seek  85; show-text ">> 1m 25s" 1500

# --- Extra Seek Presets ---
# Ctrl+Arrows: medium seek
Ctrl+RIGHT    no-osd seek  30; show-text ">> 30s" 1500
Ctrl+LEFT     no-osd seek -30; show-text "<< 30s" 1500

# Alt+Arrows: fine exact seek
Alt+RIGHT     no-osd seek  1 exact; show-text ">> 1s exact" 1500
Alt+LEFT      no-osd seek -1 exact; show-text "<< 1s exact" 1500

# Page Up/Down: chapter skip and long jump
PGUP          no-osd add chapter 1; show-text "Next Chapter" 1200
PGDWN         no-osd add chapter -1; show-text "Previous Chapter" 1200
Shift+PGUP    no-osd seek  300; show-text ">> 5m" 1500
Shift+PGDWN   no-osd seek -300; show-text "<< 5m" 1500

# --- Quit Keys ---
Esc           quit
q             quit

# --- Menu Keys (PotPlayer Style) ---
h script-binding select/select-chapter
a script-binding select/select-aid
l script-binding select/select-sid
L cycle sub
Ctrl+l script-binding subtitle-mode-cycle

# --- Sync Controls ---
# Ctrl+Alt+Up/Down: audio delay
Ctrl+Alt+UP    no-osd add audio-delay  0.100; show-text "Audio Delay: ${audio-delay}" 1500
Ctrl+Alt+DOWN  no-osd add audio-delay -0.100; show-text "Audio Delay: ${audio-delay}" 1500

# Ctrl+Alt+Left/Right: subtitle delay
Ctrl+Alt+LEFT  no-osd add sub-delay -0.100; show-text "Subtitle Delay: ${sub-delay}" 1500
Ctrl+Alt+RIGHT no-osd add sub-delay  0.100; show-text "Subtitle Delay: ${sub-delay}" 1500

# Ctrl+Alt+Backspace: reset sync offsets
Ctrl+Alt+BS   no-osd set audio-delay 0; no-osd set sub-delay 0; show-text "Audio/Sub Delay Reset" 1500

# --- Double Click Handling ---
# Right click behavior is handled by the Lua script below, so unbind native fallbacks.
MBTN_RIGHT    ignore
MBTN_RIGHT_DBL ignore

# --- PotPlayer Speed Controls ---

# 'x' decreases speed by 0.1
x add speed -0.1
# 'c' increases speed by 0.1
c add speed 0.1
# 'z' activates the toggle script we just named "speed-toggle"
z script-binding speed-toggle
# Optional: Reset to 1.0 without saving (Backspace)
BS set speed 1.0
